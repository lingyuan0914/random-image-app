name: Build & Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release-key.jks
            echo "keystore_available=true" >> $GITHUB_ENV
          else
            echo "⚠️ No KEYSTORE_BASE64 secret found, will build unsigned APK"
            echo "keystore_available=false" >> $GITHUB_ENV
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        if: env.keystore_available == 'true'
        run: ./gradlew assembleRelease

      - name: Build Debug APK (no signing key)
        if: env.keystore_available == 'false'
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk random-image-app.apk
          else
            cp app/build/outputs/apk/debug/app-debug.apk random-image-app.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: random-image-app
          path: random-image-app.apk

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          files: random-image-app.apk
          body: |
            ## 随机图片 v${{ steps.version.outputs.version }}

            ### 下载安装
            下载 `random-image-app.apk` 文件，直接安装到 Android 设备即可。

            ### 更新内容
            请查看提交记录了解具体更新内容。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
